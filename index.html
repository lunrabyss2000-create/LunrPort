<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunrAbyss | Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            min-height: 100vh;
        }
        
        /* Left Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #000000;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            border-right: 1px solid #111;
        }
        .brand h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: underline;
            text-underline-offset: 6px;
            margin-bottom: 8px;
        }
        .brand p {
            color: #888888;
            font-size: 0.85rem;
        }
        .nav-links {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .nav-links a.active {
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .nav-links a:hover {
            color: #ff6600;
        }
        .sidebar-footer {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        /* Tiny SVG ArtStation Icon stylized in signature orange */
        .artstation-icon img {
            width: 20px;
            height: 20px;
            filter: invert(47%) sepia(97%) saturate(2321%) hue-rotate(360deg) brightness(103%) contrast(104%);
            transition: opacity 0.2s;
        }
        .artstation-icon img:hover {
            opacity: 0.8;
        }
        .copyright {
            color: #666666;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }
        .copyright a {
            color: #666666;
            text-decoration: underline;
        }

        /* Right Content Area Styling */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }
        
        /* Portfolio Grid Layout */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }
        .portfolio-item {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        .portfolio-item:hover {
            transform: translateY(-2px);
            border-color: #ff6600;
        }
        .portfolio-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .portfolio-info {
            padding: 16px;
        }
        .portfolio-info h3 {
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .portfolio-info p {
            font-size: 0.8rem;
            color: #888888;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; padding: 24px; border-right: none; border-bottom: 1px solid #222; }
            .main-content { margin-left: 0; padding: 24px; }
            .nav-links { margin-top: 24px; flex-direction: row; gap: 24px; }
        }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="brand">
                <h1>LunrAbyss</h1>
                <p>Hobby Artist</p>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">Home</a>
                <!-- Link your ArtStation account or custom resume here -->
                <a href="https://lunrabyss.artstation.com/" target="_blank">Full Portfolio</a> 
            </nav>
        </div>
        
        <div class="sidebar-footer">
            <!-- Orange ArtStation Icon Link -->
            <a href="https://www.artstation.com/" target="_blank" class="artstation-icon">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/artstation.svg" alt="ArtStation">
            </a>
            <div class="copyright">
                <span>© All rights reserved</span>
                <a href="#">Back to top</a>
            </div>
        </div>
    </aside>

    <!-- RIGHT CONTENT AREA -->
    <main class="main-content">
        <div class="portfolio-grid">
            
            <!-- Item 1: Holy Sword -->
            <div class="portfolio-item">
                <img src="BigSwordWithHoleBetterRender.jpg" alt="Holy Sword">
                <div class="portfolio-info">
                    <h3>Holy Sword</h3>
                    <p>3D Hard-Surface Weapon Model</p>
                </div>
            </div>

            <!-- Item 2: Fractal Pyramid -->
            <div class="portfolio-item">
                <img src="FractalPyramid.jpg" alt="Fractal Pyramid">
                <div class="portfolio-info">
                    <h3>Sierpinski Fractal Pyramid</h3>
                    <p>Atmospheric Environment Prop</p>
                </div>
            </div>

            <!-- Add more item blocks as you make more models! -->

        </div>
    </main>

</body>
</html>
